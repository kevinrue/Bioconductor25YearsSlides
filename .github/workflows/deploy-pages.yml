name: Deploy Carousel to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - site/**
      - photos/**
      - scripts/generate_manifest.py
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate image manifest
        run: python scripts/generate_manifest.py --photos-dir photos

      - name: Build static site bundle
        run: |
          mkdir -p dist/photos
          cp -r site/* dist/
          cp -r photos/* dist/photos/ || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
